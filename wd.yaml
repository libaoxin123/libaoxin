# === 代理组定义 ===
proxy-groups:
  # 核心节点选择组（命名简洁、无空格）
  - name: 节点选择
    type: select
    proxies:
      - 香港节点
      - 台湾节点
      - 新加坡节点
      - 日本节点
      - 美国节点
      - 韩国节点
      - 手动切换
      - DIRECT

  # 手动切换（自动包含全部节点，无需显式列表）
  - name: 手动切换
    type: select
    include-all: true
    proxies: 
      - 香港节点
      - 台湾节点
      - 新加坡节点
      - 日本节点
      - 美国节点
      - 韩国节点
      - 手动切换
      - DIRECT
  # 媒体专用组（Emby）
  - name: Emby
    type: select
    proxies:
      - 低倍率节点
      - DIRECT
      - 手动切换

  # 直连优先组（优先直连，失败后 fallback 到节点选择）
  - name: 全球直连
    type: select
    proxies:
      - DIRECT
      - 节点选择
      - 手动切换

  # 特殊用途：低倍率节点（匹配 0.1 ~ 0.5x 带宽节点）
  - name: 低倍率节点
    type: url-test
    include-all: true
    url: http://www.gstatic.com/generate_204
    filter: (?i)0\.[1-5]\d*  # 匹配 0.1, 0.15, 0.5, 0.50 等（更严谨）
    interval: 300
    tolerance: 50
    timeout: 5000

  # 区域节点组（统一命名 + 正则优化）
  - name: 香港节点
    type: url-test
    include-all: true
    url: http://www.gstatic.com/generate_204
    filter: (?i)港|HK|Hong\s*Kong|HongKong
    interval: 300
    tolerance: 50
    timeout: 5000

  - name: 台湾节点
    type: url-test
    include-all: true
    url: http://www.gstatic.com/generate_204
    filter: (?i)台|TW|Taiwan|新北|彰化
    interval: 300
    tolerance: 50
    timeout: 5000

  - name: 新加坡节点
    type: url-test
    include-all: true
    url: http://www.gstatic.com/generate_204
    filter: (?i)新加坡|坡|狮城|SG|Singapore
    interval: 300
    tolerance: 50
    timeout: 5000

  - name: 日本节点
    type: url-test
    include-all: true
    url: http://www.gstatic.com/generate_204
    filter: (?i)日本|JP|Japan|东京|大阪|川日|泉日|埼玉|沪日|深日
    interval: 300
    tolerance: 50
    timeout: 5000

  - name: 美国节点
    type: url-test
    include-all: true
    url: http://www.gstatic.com/generate_204
    filter: (?i)美|US|United\s*States|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥
    interval: 300
    tolerance: 50
    timeout: 5000

  - name: 韩国节点
    type: url-test
    include-all: true
    url: http://www.gstatic.com/generate_204
    filter: (?i)韩|KR|Korea|KOR|首尔
    interval: 300
    tolerance: 50
    timeout: 5000

