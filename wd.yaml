# === 规则表（显式分层 + 优化兜底逻辑）===
rules:
  # 【1】高优先级：媒体服务（避免直连导致卡顿）
  - RULE-SET,Emby,Emby
  - RULE-SET,Tmdb,节点选择
  - RULE-SET,YouTube,节点选择

  # 【2】社交/开发工具（需稳定低延迟）
  - RULE-SET,Telegram,节点选择
  - RULE-SET,GitHub,节点选择
  - RULE-SET,Google,节点选择

  # 【3】游戏平台（国内直连 + 国际代理）
  - RULE-SET,SteamCN,全球直连
  - RULE-SET,Steam,节点选择

  # 【4】其他代理类规则
  - RULE-SET,ProxyLite,节点选择

  # 【5】国内直连（含自定义规则）
  - RULE-SET,Chinamax,全球直连
  - RULE-SET,WD,全球直连

  # 【6】兜底规则（最后匹配）——不再引用“节点选择”，避免循环策略
  - MATCH,手动切换
