# 规则表（优化优先级+精简逻辑）
rules:
  # 1. 媒体类（高优先级）
  - RULE-SET,Emby,Emby
  - RULE-SET,YouTube,节点选择
  # 2. 社交/工具类
  - RULE-SET,Telegram,节点选择
  - RULE-SET,GitHub,节点选择
  - RULE-SET,Google,节点选择
  # 3. 娱乐类
  - RULE-SET,SteamCN,全球直连  # 国内Steam优先直连
  - RULE-SET,Steam,节点选择   # 国际Steam走节点
  # 4. 特殊用途
  - RULE-SET,Porn,节点选择
  - RULE-SET,ProxyLite,节点选择
  # 5. 国内/直连类
  - RULE-SET,Chinamax,全球直连
  - RULE-SET,WD,全球直连
  # 6. 兜底规则（最后匹配）
  - MATCH,漏网之鱼
