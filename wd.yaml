proxy-groups:
  # 核心节点选择组（简化命名，提升可读性）
  - name: 节点选择
    type: select
    proxies:
      - 自动选择
      - 香港节点
      - 台湾节点
      - 新加坡节点  # 原"狮城节点"，统一为通用命名
      - 日本节点
      - 美国节点
      - 韩国节点
      - 手动切换
      - DIRECT

  # 手动兜底组（仅保留核心，避免冗余）
  - name: 手动切换
    type: select
    include-all: true
    proxies: []  # 自动包含所有节点，清空显式列表更简洁

  # 自动测速组（优化参数，提升测速准确性）
  - name: 自动选择
    type: url-test
    include-all: true
    url: http://www.gstatic.com/generate_204  # 补充标准测速URL
    interval: 300
    tolerance: 50
    timeout: 5000  # 新增超时配置，避免测速卡死

  # 媒体专用组（Emby）
  - name: Emby
    type: select
    proxies:
      - 低倍率节点
      - DIRECT
      - 手动切换

  # 直连优先组（简化逻辑，优先直连，兜底节点）
  - name: 全球直连
    type: select
    proxies:
      - DIRECT
      - 自动选择  # 优先自动选择，替代原"节点选择"，减少嵌套
      - 手动切换

  # 兜底组（精简冗余节点，避免重复）
  - name: 漏网之鱼
    type: select
    proxies:
      - 自动选择
      - DIRECT
      - 手动切换

  # 区域节点组（统一命名+优化过滤规则，提升匹配准确性）
  - name: 香港节点
    type: url-test
    include-all: true
    url: http://www.gstatic.com/generate_204
    filter: (?i)港|HK|Hong\s?Kong  # 优化正则，匹配"Hong Kong"/"HongKong"
    interval: 300
    tolerance: 50
    timeout: 5000

  - name: 台湾节点
    type: url-test
    include-all: true
    url: http://www.gstatic.com/generate_204
    filter: (?i)台|TW|Taiwan|新北|彰化
    interval: 300
    tolerance: 50
    timeout: 5000

  - name: 新加坡节点
    type: url-test
    include-all: true
    url: http://www.gstatic.com/generate_204
    filter: (?i)新加坡|坡|狮城|SG|Singapore
    interval: 300
    tolerance: 50
    timeout: 5000

  - name: 日本节点
    type: url-test
    include-all: true
    url: http://www.gstatic.com/generate_204
    filter: (?i)日本|JP|Japan|东京|大阪|川日|泉日|埼玉|沪日|深日
    interval: 300
    tolerance: 50
    timeout: 5000

  - name: 美国节点
    type: url-test
    include-all: true
    url: http://www.gstatic.com/generate_204
    filter: (?i)美|US|United\s?States|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥
    interval: 300
    tolerance: 50
    timeout: 5000

  - name: 韩国节点
    type: url-test
    include-all: true
    url: http://www.gstatic.com/generate_204
    filter: (?i)韩|KR|Korea|KOR|首尔
    interval: 300
    tolerance: 50
    timeout: 5000

  # 特殊用途组（低倍率节点）
  - name: 低倍率节点
    type: url-test
    include-all: true
    url: http://www.gstatic.com/generate_204
    filter: (?i)0\.[1-5]  # 简化正则，匹配0.1-0.5所有低倍率
    interval: 300
    tolerance: 50
    timeout: 5000

